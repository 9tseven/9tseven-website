<h2>Featured Products — Layout v3</h2>
<p class="subtitle">Much taller cards. Too tall, just right, or still too short?</p>

<div class="mockup">
  <div class="mockup-header">FeaturedProductsSection</div>
  <div class="mockup-body" style="background:#fff;padding:48px 0 40px;font-family:sans-serif;">

    <!-- Section header -->
    <div style="text-align:center;margin-bottom:36px;">
      <span style="font-size:9px;letter-spacing:0.25em;color:#999;text-transform:uppercase;">( FEATURED PRODUCTS )</span>
    </div>

    <!-- Carousel viewport -->
    <div style="overflow:hidden;padding:0 5%;position:relative;">
      <div style="display:flex;gap:16px;align-items:stretch;">
        <!-- Card 1 (hover state) -->
        <div style="flex:0 0 calc(50% - 8px);background:#e0e0e0;border-radius:2px;height:520px;position:relative;overflow:hidden;">
          <div style="position:absolute;bottom:0;left:0;right:0;padding:12px 14px;background:rgba(255,255,255,0.96);border-top:1px solid #eee;">
            <div style="font-size:8px;letter-spacing:0.15em;color:#aaa;text-transform:uppercase;margin-bottom:2px;">ODD-001</div>
            <div style="font-size:10px;font-weight:600;letter-spacing:0.08em;color:#111;text-transform:uppercase;">CLASSIC POLO (BLACK)</div>
            <div style="font-size:9px;color:#555;margin-top:4px;">R 850.00</div>
          </div>
        </div>
        <!-- Card 2 (inactive) -->
        <div style="flex:0 0 calc(50% - 8px);background:#d8d8d8;border-radius:2px;height:520px;"></div>
        <!-- Card 3 (peek) -->
        <div style="flex:0 0 5%;background:#ccc;border-radius:2px;height:520px;opacity:0.4;"></div>
      </div>
    </div>

    <!-- Progress indicator -->
    <div style="display:flex;justify-content:flex-end;padding:0 5%;margin-top:20px;">
      <div style="width:25%;min-width:160px;">
        <div style="display:flex;gap:4px;width:100%;">
          <div style="flex:1;height:1px;background:#111;"></div>
          <div style="flex:1;height:1px;background:#ccc;"></div>
          <div style="flex:1;height:1px;background:#ccc;"></div>
          <div style="flex:1;height:1px;background:#ccc;"></div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;">
          <span style="font-size:9px;letter-spacing:0.2em;color:#999;">01 / 04</span>
          <div style="display:flex;gap:10px;">
            <span style="font-size:11px;color:#ccc;">‹</span>
            <span style="font-size:11px;color:#555;">›</span>
          </div>
        </div>
      </div>
    </div>

    <!-- VIEW ALL link -->
    <div style="text-align:center;margin-top:32px;">
      <span style="font-size:9px;letter-spacing:0.2em;color:#888;text-transform:uppercase;border-bottom:1px solid #ddd;padding-bottom:2px;">VIEW ALL PRODUCTS</span>
    </div>

  </div>
</div>
